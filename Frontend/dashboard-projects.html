<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Admin projects settings for the portfolio." />
  <title>AI Portfolio | Dashboard - Projects</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-theme="dark" class="min-h-screen flex flex-col bg-slate-950 text-slate-100">
  <header>
    <nav class="max-w-6xl mx-auto flex items-center justify-between px-4 py-4">
      <h1 class="font-semibold">Admin Dashboard</h1>
      <div class="flex items-center gap-3">
        <a href="index.html" class="text-xs px-3 py-1 border border-slate-700 rounded-full hover:border-indigo-400">Go to Homepage</a>
        <a href="gallery.html" class="text-xs px-3 py-1 border border-slate-700 rounded-full hover:border-indigo-400">Gallery</a>
        <button id="logout-btn" class="text-xs px-3 py-1 border border-red-500 text-red-400 rounded-full">Logout</button>
        <button id="theme-toggle" class="text-xs px-3 py-1 border border-slate-700 rounded-full">Toggle Theme</button>
      </div>
    </nav>
  </header>
  <div class="bg-slate-950/80 sticky top-0 z-20 backdrop-blur">
    <div class="max-w-6xl mx-auto px-4 py-3 overflow-x-auto">
      <nav class="flex flex-wrap justify-center gap-2 text-xs">
        <a href="dashboard.html" class="px-3 py-1 rounded-full border border-slate-700 hover:border-indigo-400">Overview</a>
        <a href="dashboard-home.html" class="px-3 py-1 rounded-full border border-slate-700 hover:border-indigo-400">Home</a>
        <a href="dashboard-contact.html" class="px-3 py-1 rounded-full border border-slate-700 hover:border-indigo-400">Contact</a>
        <a href="dashboard-about.html" class="px-3 py-1 rounded-full border border-slate-700 hover:border-indigo-400">About</a>
        <a href="dashboard-projects.html" class="px-3 py-1 rounded-full border border-indigo-400 text-indigo-300">Projects</a>
        <a href="dashboard-media.html" class="px-3 py-1 rounded-full border border-slate-700 hover:border-indigo-400">Media</a>
        <a href="gallery.html" class="px-3 py-1 rounded-full border border-slate-700 hover:border-indigo-400">Gallery</a>
        <a href="dashboard-admin.html" class="px-3 py-1 rounded-full border border-slate-700 hover:border-indigo-400">Admin</a>
      </nav>
    </div>
  </div>
  <main class="flex-1 max-w-6xl mx-auto px-4 py-8 space-y-10 fade-in">
    <section id="admin-projects-settings" class="bg-slate-900/30 border border-slate-800 rounded-3xl p-5 md:p-6">
      <header class="flex items-center justify-between mb-4"><div><h2 class="text-xl font-semibold">Projects</h2><p class="text-xs text-slate-400">Create, edit, and remove portfolio projects.</p></div><button id="refresh-projects" class="text-xs px-3 py-1 border border-slate-700 rounded-full">Refresh</button></header>
      <form id="project-form" class="bg-slate-900/60 border border-slate-800 rounded-2xl p-5 grid md:grid-cols-2 gap-4 text-sm">
        <input type="hidden" id="project-id" />
        <div><label for="title" class="block mb-1">Title</label><input id="title" name="title" required class="w-full px-3 py-2 rounded bg-slate-900 border border-slate-700" /></div>
        <div><label for="category" class="block mb-1">Category</label><select id="category" name="category" class="w-full px-3 py-2 rounded bg-slate-900 border border-slate-700"><option value="ai">AI</option><option value="web">Web</option><option value="data">Data Science</option></select></div>
        <div class="md:col-span-2"><label for="description" class="block mb-1">Description</label><textarea id="description" name="description" rows="3" class="w-full px-3 py-2 rounded bg-slate-900 border border-slate-700"></textarea></div>
        <div><label for="githubUrl" class="block mb-1">GitHub URL</label><input id="githubUrl" name="githubUrl" type="url" class="w-full px-3 py-2 rounded bg-slate-900 border border-slate-700" /></div>
        <div><label for="liveUrl" class="block mb-1">Live URL</label><input id="liveUrl" name="liveUrl" type="url" class="w-full px-3 py-2 rounded bg-slate-900 border border-slate-700" /></div>
        <div><label for="techStack" class="block mb-1">Tech Stack (comma-separated)</label><input id="techStack" name="techStack" class="w-full px-3 py-2 rounded bg-slate-900 border border-slate-700" /></div>
        <div><label for="image" class="block mb-1">Image</label><input id="image" name="image" type="file" accept="image/*" class="w-full text-xs" /></div>
        <div class="md:col-span-2 flex gap-3"><button type="submit" class="px-4 py-2 rounded-full bg-indigo-500 hover:bg-indigo-600 text-xs font-medium">Save Project</button><button type="button" id="reset-project-form" class="px-4 py-2 rounded-full border border-slate-700 text-xs">Reset</button><p id="project-form-status" class="text-xs mt-2"></p></div>
      </form>
      <div id="admin-projects-list" class="mt-6 grid md:grid-cols-3 gap-4 text-xs"></div>
    </section>
  </main>
  <footer class="border-t border-slate-800 mt-10"><div class="max-w-6xl mx-auto px-4 py-6 text-xs text-slate-400">&copy; <span id="year"></span> Dulneth Damsira.</div></footer>
  <script src="js/env.js"></script>
  <script src="js/main.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
