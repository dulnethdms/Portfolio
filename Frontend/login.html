<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Admin login for AI portfolio." />
  <title>AI Portfolio | Admin Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-theme="dark" class="min-h-screen flex items-center justify-center bg-slate-950 text-slate-100">
  <main class="w-full max-w-sm bg-slate-900/70 border border-slate-800 rounded-2xl p-6 fade-in">
    <header class="mb-4 text-center">
      <h1 class="text-xl font-semibold mb-1">Admin Login</h1>
      <p class="text-xs text-slate-400">Secure access to manage projects and blog posts.</p>
    </header>
    <form id="login-form" class="space-y-4">
      <div>
        <label for="email" class="block text-sm mb-1">Email</label>
        <input id="email" name="email" type="email" required class="w-full px-3 py-2 rounded bg-slate-900 border border-slate-700 text-sm" />
      </div>
      <div>
        <label for="password" class="block text-sm mb-1">Password</label>
        <input id="password" name="password" type="password" required minlength="6" class="w-full px-3 py-2 rounded bg-slate-900 border border-slate-700 text-sm" />
      </div>
      <button type="submit" class="w-full px-4 py-2 rounded-full bg-indigo-500 hover:bg-indigo-600 text-sm font-medium">
        Login
      </button>
      <p id="login-status" class="text-xs mt-2 text-center"></p>
    </form>
  </main>

  <script src="js/env.js"></script>
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
