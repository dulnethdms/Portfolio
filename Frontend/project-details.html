  <header>
    <nav class="max-w-6xl mx-auto flex items-center justify-between px-4 py-4">
      <a href="index.html" class="flex items-center gap-2">
        <span class="w-8 h-8 rounded-full bg-indigo-500 flex items-center justify-center text-xs font-bold">AI</span>
        <span class="font-semibold tracking-wide">AI Student Portfolio</span>

      <ul class="hidden md:flex gap-6 text-sm">
