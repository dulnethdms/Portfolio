<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Detailed view of a project." />
  <title>AI Portfolio | Project Details</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-theme="dark" class="min-h-screen flex flex-col bg-slate-950 text-slate-100">
  <header class="border-b border-slate-800">
    <nav class="max-w-6xl mx-auto flex items-center justify-between px-4 py-4">
      <a href="index.html" class="flex items-center gap-2">
        <span class="w-8 h-8 rounded-full bg-indigo-500 flex items-center justify-center text-xs font-bold">AI</span>
        <span class="font-semibold tracking-wide">AI Student Portfolio</span>
      </a>
      <button id="theme-toggle" class="text-sm px-3 py-1 border border-slate-700 rounded-full">
        Toggle Theme
      </button>
    </nav>
  </header>

  <main class="flex-1 max-w-4xl mx-auto px-4 py-10 fade-in">
    <article id="project-details">
      <!-- Filled dynamically via JS using query param ?id=... -->
      <p class="text-sm text-slate-400">Loading project...</p>
    </article>
  </main>

  <footer class="border-t border-slate-800 mt-10">
    <div class="max-w-4xl mx-auto px-4 py-6 text-xs text-slate-400">
      &copy; <span id="year"></span> Your Name.
    </div>
  </footer>

  <script src="js/env.js"></script>
  <script src="js/main.js"></script>
  <script src="js/projects.js"></script>
</body>
</html>
