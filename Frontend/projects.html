<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI, web, and data science projects." />
  <title>AI Portfolio | Projects</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-theme="dark" class="min-h-screen flex flex-col bg-slate-950 text-slate-100">
  <header class="border-b border-slate-800">
    <nav class="max-w-6xl mx-auto flex items-center justify-between px-4 py-4">
      <a href="index.html" class="flex items-center gap-2">
        <span class="w-8 h-8 rounded-full bg-indigo-500 flex items-center justify-center text-xs font-bold">AI</span>
        <span class="font-semibold tracking-wide">AI Student Portfolio</span>
      </a>
      <button id="theme-toggle" class="text-sm px-3 py-1 border border-slate-700 rounded-full">
        Toggle Theme
      </button>
      <ul class="hidden md:flex gap-6 text-sm">
        <li><a href="index.html" class="hover:text-indigo-400">Home</a></li>
        <li><a href="about.html" class="hover:text-indigo-400">About</a></li>
        <li><a href="projects.html" class="hover:text-indigo-400">Projects</a></li>
        <li><a href="contact.html" class="hover:text-indigo-400">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main class="flex-1 max-w-6xl mx-auto px-4 py-10 fade-in">
    <header class="mb-6 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
      <div>
        <h1 class="text-3xl font-bold mb-1">Projects</h1>
        <p class="text-slate-300 text-sm">AI, web, and data science projects with real-world applications.</p>
      </div>
      <div class="flex flex-wrap gap-2 text-xs">
        <button class="project-filter px-3 py-1 rounded-full border border-slate-700 bg-indigo-500" data-filter="all">All</button>
        <button class="project-filter px-3 py-1 rounded-full border border-slate-700" data-filter="ai">AI</button>
        <button class="project-filter px-3 py-1 rounded-full border border-slate-700" data-filter="web">Web</button>
        <button class="project-filter px-3 py-1 rounded-full border border-slate-700" data-filter="data">Data Science</button>
      </div>
    </header>

    <section>
      <div id="projects-grid" class="grid md:grid-cols-3 gap-6">
        <!-- Filled dynamically via JS -->
      </div>
    </section>
  </main>

  <footer class="border-t border-slate-800 mt-10">
    <div class="max-w-6xl mx-auto px-4 py-6 text-xs text-slate-400">
      &copy; <span id="year"></span> Your Name.
    </div>
  </footer>

  <script src="js/env.js"></script>
  <script src="js/main.js"></script>
  <script src="js/projects.js"></script>
</body>
</html>
