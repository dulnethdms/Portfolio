<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Full image gallery for the portfolio." />
  <title>AI Portfolio | Gallery</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-theme="dark" class="relative isolate overflow-x-hidden min-h-screen flex flex-col bg-slate-950 text-slate-100">
  <div id="site-background-spreads" aria-hidden="true" class="pointer-events-none fixed -inset-24 z-0 overflow-hidden">
    <div data-bg-orb="1" class="absolute -top-28 -left-20 h-96 w-96 rounded-full bg-indigo-500/20 blur-3xl"></div>
    <div data-bg-orb="2" class="absolute top-36 right-0 h-[32rem] w-[32rem] rounded-full bg-sky-500/15 blur-3xl"></div>
    <div data-bg-orb="3" class="absolute bottom-[-8rem] left-1/3 h-[30rem] w-[30rem] rounded-full bg-emerald-400/10 blur-3xl"></div>
    <div data-bg-gradient="true" class="absolute inset-0 bg-[radial-gradient(circle_at_top,rgba(99,102,241,0.14),transparent_34%),radial-gradient(circle_at_80%_18%,rgba(14,165,233,0.12),transparent_28%),radial-gradient(circle_at_bottom_left,rgba(16,185,129,0.1),transparent_32%)]"></div>
  </div>

  <header class="relative z-10 bg-slate-950/10 backdrop-blur-md">
    <nav class="max-w-6xl mx-auto flex items-center justify-between px-4 py-4">
      <a href="index.html" class="flex items-center gap-2">
        <img src="https://github.com/dulnethdms/Portfolio/blob/main/IMG_3098.JPG?raw=true" alt="Profile" class="w-8 h-8 rounded-full object-cover" />
        <span class="font-semibold tracking-wide">Dulneth Damsira</span>
      </a>
      <ul class="hidden md:flex gap-6 text-sm">
        <li><a href="index.html" class="hover:text-indigo-400">Home</a></li>
        <li><a href="about.html" class="hover:text-indigo-400">About</a></li>
        <li><a href="projects.html" class="hover:text-indigo-400">Projects</a></li>
        <li><a href="gallery.html" class="hover:text-indigo-400 text-indigo-300">Gallery</a></li>
        <li><a href="contact.html" class="hover:text-indigo-400">Contact</a></li>
      </ul>
      <div class="flex items-center gap-3">
        <a href="login.html" class="text-sm px-3 py-1 border border-slate-700 rounded-full hover:border-indigo-400">Admin</a>
        <button id="theme-toggle" class="text-sm px-3 py-1 border border-slate-700 rounded-full">Theme</button>
      </div>
    </nav>
  </header>

  <main class="relative z-10 flex-1 max-w-6xl mx-auto px-4 py-8 fade-in space-y-8">
    <section class="flex flex-col md:flex-row md:items-end md:justify-between gap-4">
      <div>
        <p class="text-sm uppercase tracking-[0.3em] text-indigo-400 mb-2">Gallery</p>
        <h1 class="text-4xl font-bold mb-2">Full Photo Gallery</h1>
        <p class="text-sm text-slate-300 max-w-2xl">Browse every featured photo in one place. Click any image to view it fullscreen.</p>
      </div>
      <a href="index.html#home-photos-grid" class="inline-flex items-center px-4 py-2 rounded-full border border-slate-700 hover:border-indigo-400 text-sm">Back to Home</a>
    </section>

    <section>
      <div id="gallery-grid" class="grid gap-5 sm:grid-cols-2 lg:grid-cols-3">
        <p class="text-sm text-slate-400">Loading gallery...</p>
      </div>
    </section>
  </main>

  <footer class="border-t border-slate-800 mt-10 relative z-10">
    <div class="max-w-6xl mx-auto px-4 py-6 text-xs text-slate-400">
      &copy; <span id="year"></span> Dulneth Damsira.
    </div>
  </footer>

  <script src="js/env.js"></script>
  <script src="js/main.js"></script>
  <script src="js/gallery.js"></script>
</body>
</html>
