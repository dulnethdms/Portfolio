<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Admin media settings for the portfolio." />
  <title>AI Portfolio | Dashboard - Media</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-theme="dark" class="min-h-screen flex flex-col bg-slate-950 text-slate-100">
  <header>
    <nav class="max-w-6xl mx-auto flex items-center justify-between px-4 py-4">
      <h1 class="font-semibold">Admin Dashboard</h1>
      <div class="flex items-center gap-3">
        <a href="index.html" class="text-xs px-3 py-1 border border-slate-700 rounded-full hover:border-indigo-400">Go to Homepage</a>
        <a href="gallery.html" class="text-xs px-3 py-1 border border-slate-700 rounded-full hover:border-indigo-400">Gallery</a>
        <button id="logout-btn" class="text-xs px-3 py-1 border border-red-500 text-red-400 rounded-full">Logout</button>
        <button id="theme-toggle" class="text-xs px-3 py-1 border border-slate-700 rounded-full">Toggle Theme</button>
      </div>
    </nav>
  </header>
  <div class="bg-slate-950/80 sticky top-0 z-20 backdrop-blur">
    <div class="max-w-6xl mx-auto px-4 py-3 overflow-x-auto">
      <nav class="flex flex-wrap justify-center gap-2 text-xs">
        <a href="dashboard.html" class="px-3 py-1 rounded-full border border-slate-700 hover:border-indigo-400">Overview</a>
        <a href="dashboard-home.html" class="px-3 py-1 rounded-full border border-slate-700 hover:border-indigo-400">Home</a>
        <a href="dashboard-contact.html" class="px-3 py-1 rounded-full border border-slate-700 hover:border-indigo-400">Contact</a>
        <a href="dashboard-about.html" class="px-3 py-1 rounded-full border border-slate-700 hover:border-indigo-400">About</a>
        <a href="dashboard-projects.html" class="px-3 py-1 rounded-full border border-slate-700 hover:border-indigo-400">Projects</a>
        <a href="dashboard-media.html" class="px-3 py-1 rounded-full border border-indigo-400 text-indigo-300">Media</a>
        <a href="gallery.html" class="px-3 py-1 rounded-full border border-slate-700 hover:border-indigo-400">Gallery</a>
        <a href="dashboard-admin.html" class="px-3 py-1 rounded-full border border-slate-700 hover:border-indigo-400">Admin</a>
      </nav>
    </div>
  </div>
  <main class="flex-1 max-w-6xl mx-auto px-4 py-8 space-y-10 fade-in">
    <section class="bg-slate-900/30 border border-slate-800 rounded-3xl p-5 md:p-6">
      <header class="mb-4"><h2 class="text-xl font-semibold">Blog Posts (placeholder)</h2><p class="text-xs text-slate-400">You can extend this section with CRUD operations similar to projects.</p></header>
    </section>
    <section class="bg-slate-900/30 border border-slate-800 rounded-3xl p-5 md:p-6">
      <header class="flex items-center justify-between mb-4"><h2 class="text-xl font-semibold">CV Management</h2></header>
      <form id="cv-form" class="bg-slate-900/60 border border-slate-800 rounded-2xl p-5 grid md:grid-cols-2 gap-4 text-sm">
        <div><label for="cv-file" class="block mb-1">Upload CV (PDF, DOC, DOCX)</label><input id="cv-file" name="cv" type="file" accept=".pdf,.doc,.docx,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document" required class="w-full text-xs" /></div>
        <div class="flex items-end"><button type="submit" class="px-4 py-2 rounded-full bg-indigo-500 hover:bg-indigo-600 text-xs font-medium">Upload CV</button></div>
        <div class="md:col-span-2 flex flex-wrap items-center gap-3"><a id="current-cv-link" href="#" target="_blank" rel="noopener" class="text-xs text-indigo-300 hover:underline hidden">View current CV</a><button id="delete-cv-btn" type="button" class="px-3 py-1 border border-red-500 text-red-400 rounded text-xs hidden">Remove CV</button><p id="cv-form-status" class="text-xs"></p></div>
      </form>
    </section>
    <section class="bg-slate-900/30 border border-slate-800 rounded-3xl p-5 md:p-6">
      <header class="flex items-center justify-between mb-4"><h2 class="text-xl font-semibold">Homepage Photos</h2><button id="refresh-photos" class="text-xs px-3 py-1 border border-slate-700 rounded-full">Refresh</button></header>
      <form id="photo-form" class="bg-slate-900/60 border border-slate-800 rounded-2xl p-5 grid md:grid-cols-2 gap-4 text-sm">
        <div><label for="photo-caption" class="block mb-1">Caption (optional)</label><input id="photo-caption" name="caption" class="w-full px-3 py-2 rounded bg-slate-900 border border-slate-700" /></div>
        <div><label for="photo-image" class="block mb-1">Image</label><input id="photo-image" name="image" type="file" accept="image/*" required class="w-full text-xs" /></div>
        <div class="md:col-span-2 flex gap-3 items-center"><button type="submit" class="px-4 py-2 rounded-full bg-indigo-500 hover:bg-indigo-600 text-xs font-medium">Upload Photo</button><p id="photo-form-status" class="text-xs"></p></div>
      </form>
      <div id="admin-photos-list" class="mt-6 grid sm:grid-cols-2 md:grid-cols-4 gap-4 text-xs"></div>
    </section>
  </main>
  <footer class="border-t border-slate-800 mt-10"><div class="max-w-6xl mx-auto px-4 py-6 text-xs text-slate-400">&copy; <span id="year"></span> Dulneth Damsira.</div></footer>
  <script src="js/env.js"></script>
  <script src="js/main.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
